<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FlowFinance</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FlowFinance">
    <meta name="theme-color" content="#020617">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --accent: #3b82f6; --bg: #020617; --panel: rgba(30, 41, 59, 0.6); --text-main: #f8fafc; --text-muted: #94a3b8; --border-color: rgba(255,255,255,0.08); --bg-input: rgba(0,0,0,0.3); }
        body.light-theme { --accent: #2563eb; --bg: #f1f5f9; --panel: rgba(255, 255, 255, 0.8); --text-main: #0f172a; --text-muted: #64748b; --border-color: rgba(0,0,0,0.06); --bg-input: rgba(255,255,255,0.5); }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; transition: background 0.4s; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: -20%; right: -10%; width: 70%; height: 70%; background: radial-gradient(circle, var(--accent) 0%, transparent 60%); opacity: 0.15; z-index: -1; pointer-events: none; }
        [v-cloak] { display: none !important; }
        .panel { background: var(--panel); backdrop-filter: blur(24px); border: 1px solid var(--border-color); border-radius: 2rem; }
        .input-huge { background: transparent; border: none; font-size: 3.5rem; font-weight: 900; text-align: center; color: var(--text-main); width: 100%; outline: none; }
        ::-webkit-scrollbar { display: none; }
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up-enter-from, .slide-up-leave-to { opacity: 0; transform: translateY(40px) scale(0.95); }
        .splash-enter-active, .splash-leave-active { transition: opacity 0.6s ease; }
        .splash-leave-to { opacity: 0; pointer-events: none; }
        .logo-path { stroke-dasharray: 150; stroke-dashoffset: 150; animation: drawLine 1.5s forwards; }
        @keyframes drawLine { to { stroke-dashoffset: 0; } }
        .swipe-item { position: relative; overflow: hidden; border-radius: 1.5rem; touch-action: pan-y; }
        .swipe-transition { transition: transform 0.3s; }
        .lock-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(50px); }
    </style>
</head>
<body class="pb-32 antialiased">
    <div id="app" v-cloak class="max-w-md mx-auto p-4 min-h-screen flex flex-col relative z-10">
        
        <div v-if="appLocked" class="lock-overlay">
            <div class="text-center p-8">
                <div class="text-6xl mb-6">🔐</div>
                <h2 class="text-2xl font-900 mb-10 tracking-tighter">Flow<span class="text-blue-500">Finance</span></h2>
                <button @click="unlockApp" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-900 uppercase tracking-widest active:scale-95 transition-all shadow-lg">Разблокировать</button>
            </div>
        </div>

        <transition name="splash">
            <div v-if="!appLoaded && !appLocked" class="fixed inset-0 z-[999] flex flex-col items-center justify-center" :style="{ background: 'var(--bg)' }">
                <div class="w-24 h-24 mb-6">
                    <svg viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path class="logo-path" d="M 15 80 Q 40 80, 55 55 T 80 25" stroke="#3b82f6" stroke-width="10" />
                        <path d="M 55 25 L 80 25 L 80 50" stroke="#10b981" stroke-width="10" />
                    </svg>
                </div>
                <h1 class="text-3xl font-900 tracking-tighter">Flow<span class="text-blue-500">Finance</span></h1>
            </div>
        </transition>

        <div v-show="appLoaded && !appLocked" class="contents">
            <header class="flex justify-between items-center py-4">
                <div class="flex flex-col">
                    <h1 class="text-2xl font-900 tracking-tighter mb-3">Flow<span class="text-blue-500">Finance</span></h1>
                    <div class="relative inline-flex items-center w-max" v-if="transactions.length > 0">
                        <select v-model="activeMonth" class="absolute inset-0 w-full h-full opacity-0 z-10">
                            <option v-for="m in availableMonths" :key="m.val" :value="m.val">{{ m.label }}</option>
                        </select>
                        <div class="px-4 py-2 rounded-full border border-blue-500/50 bg-blue-500/10 text-blue-500 text-[11px] font-bold">
                            {{ activeMonthLabel }} ▾
                        </div>
                    </div>
                </div>
                <div class="flex gap-2 self-start mt-1">
                    <button v-if="user" @click="showSettings = true" class="w-10 h-10 rounded-full border-2 border-blue-500/30 overflow-hidden shadow-sm">
                        <img v-if="user.photoURL" :src="user.photoURL" class="w-full h-full object-cover">
                        <div v-else class="w-full h-full flex items-center justify-center bg-blue-600 text-white font-bold text-xs">{{ user.email[0].toUpperCase() }}</div>
                    </button>
                    <button @click="toggleTheme" class="w-10 h-10 rounded-full panel flex items-center justify-center text-xl active:scale-90 transition-transform">{{ isLight ? '🌙' : '☀️' }}</button>
                    <button v-if="!user" @click="showSettings = true" class="w-10 h-10 rounded-full panel flex items-center justify-center active:scale-90 transition-transform">⚙️</button>
                </div>
            </header>

            <transition name="slide-up">
                <div v-if="!sessionMode && !showSettings && !showHistory" class="space-y-4">
                    <div v-if="transactions.length === 0" class="panel p-8 text-center mt-10">
                        <button @click="loadDemoData" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-900 uppercase">Демо-режим</button>
                    </div>
                    <template v-else>
                        <div class="panel p-6 relative overflow-hidden">
                            <div class="relative z-10 flex justify-between mb-6">
                                <div>
                                    <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Баланс месяца</p>
                                    <div class="text-4xl font-900 tracking-tighter" :class="animatedBalance >= 0 ? '' : 'text-rose-500'">{{ animatedBalance.toFixed(2) }}<span class="text-xl text-blue-500 ml-1">€</span></div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Трата / день</p>
                                    <div class="text-xl font-900 tracking-tighter">{{ forecast.daily.toFixed(0) }}€</div>
                                </div>
                            </div>
                            <div class="relative z-10 flex justify-between pt-4 border-t border-white/5">
                                <div class="text-green-500 font-900">+{{ monthIncome.toFixed(0) }}€</div>
                                <div class="text-rose-500 font-900">-{{ monthExpense.toFixed(0) }}€</div>
                            </div>
                        </div>

                        <div class="mt-8">
                            <h2 class="text-[10px] text-muted font-bold uppercase tracking-widest mb-4 ml-4">Последние операции</h2>
                            <transition-group name="list" tag="div" class="space-y-3">
                                <div v-for="t in filteredTxs.slice(0, 5)" :key="t.id" class="swipe-item">
                                    <div class="absolute inset-y-0 right-0 w-20 flex justify-center items-center bg-rose-500 text-white font-bold text-[10px]" @click="deleteTx(t.id)">УДАЛИТЬ</div>
                                    <div class="panel p-4 relative flex justify-between items-center w-full" :style="{ transform: `translateX(${getSwipeOffset(t.id)}px)` }" @touchstart="onTouchStart($event, t.id)" @touchmove="onTouchMove($event, t.id)" @touchend="onTouchEnd($event, t.id)">
                                        <div class="flex items-center gap-3">
                                            <div class="text-2xl">{{ getCatIcon(t.cat) }}</div>
                                            <div><h3 class="font-900 text-sm leading-tight">{{ t.name }}</h3><p class="text-[9px] font-bold text-muted mt-1">{{ formatDate(t.date) }}</p></div>
                                        </div>
                                        <div class="font-900 text-base" :class="t.amount > 0 ? 'text-green-500' : ''">{{ t.amount > 0 ? '+' : '' }}{{ Math.abs(t.amount).toFixed(2) }}€</div>
                                    </div>
                                </div>
                            </transition-group>
                            <button @click="showHistory = true" class="w-full mt-4 py-3 text-muted font-bold text-[10px] uppercase tracking-widest active:scale-95 transition-all">История ({{ filteredTxs.length }})</button>
                        </div>
                    </template>
                </div>
            </transition>

            <transition name="slide-up">
                <div v-if="sessionMode" class="panel p-6 flex flex-col fixed inset-x-4 top-20 z-50 min-h-[65vh] shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex gap-1"><div v-for="s in 3" :class="s <= currentStep ? 'bg-blue-500' : 'bg-white/10'" class="w-8 h-1 rounded-full transition-all"></div></div>
                        <button @click="sessionMode = false" class="text-[10px] font-bold text-muted uppercase tracking-widest">Отмена</button>
                    </div>
                    <div v-if="currentStep === 1" class="flex-1 flex flex-col justify-center">
                        <div class="flex justify-center gap-4 mb-8">
                            <button @click="wizard.type = 'expense'" :class="wizard.type === 'expense' ? 'bg-white text-black' : 'bg-white/5'" class="px-6 py-2 rounded-full font-bold text-xs tracking-widest uppercase">Расход</button>
                            <button @click="wizard.type = 'income'" :class="wizard.type === 'income' ? 'bg-white text-black' : 'bg-white/5'" class="px-6 py-2 rounded-full font-bold text-xs tracking-widest uppercase">Доход</button>
                        </div>
                        <input type="number" v-model.number="wizard.amount" class="input-huge" placeholder="0" autofocus>
                    </div>
                    <div v-if="currentStep === 2" class="grid grid-cols-3 gap-3 overflow-y-auto max-h-[45vh] p-2 no-scrollbar">
                        <button v-for="c in categories" @click="selectCategory(c.name)" class="bg-white/5 p-4 rounded-2xl flex flex-col items-center gap-1 active:scale-95 transition-transform border border-transparent hover:border-blue-500/30">
                            <span class="text-3xl mb-1">{{ c.icon }}</span><span class="text-[9px] font-bold uppercase truncate w-full text-center">{{ c.name }}</span>
                        </button>
                    </div>
                    <div v-if="currentStep === 3" class="space-y-6 flex-1 flex flex-col justify-center">
                        <div><label class="text-[9px] font-bold text-muted uppercase tracking-widest pl-4">Название</label><input type="text" v-model="wizard.name" class="w-full mt-2 bg-white/5 p-4 rounded-xl font-bold border border-white/5" :placeholder="wizard.cat"></div>
                        <div><label class="text-[9px] font-bold text-muted uppercase tracking-widest pl-4">Дата</label><input type="date" v-model="wizard.date" class="w-full mt-2 bg-white/5 p-4 rounded-xl font-bold border border-white/5 [color-scheme:dark]"></div>
                    </div>
                    <button v-if="currentStep !== 2" @click="nextStep" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-900 tracking-widest uppercase shadow-lg shadow-blue-500/20 active:scale-95 transition-all mt-4">ДАЛЕЕ</button>
                </div>
            </transition>

            <transition name="slide-up">
                <div v-if="showSettings" class="panel p-6 fixed inset-x-4 top-20 z-50 shadow-2xl">
                    <div class="flex justify-between items-center mb-8"><h2 class="font-900 tracking-tighter text-xl">АККАУНТ</h2><button @click="showSettings = false" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center font-bold">✕</button></div>
                    
                    <div v-if="!user" class="space-y-6 text-center">
                        <div class="text-5xl mb-2">🌍</div>
                        <h3 class="font-900 text-sm">Облачная синхронизация</h3>
                        <p class="text-muted text-xs leading-relaxed px-4">Войдите, чтобы ваши финансы были доступны на всех ваших устройствах.</p>
                        <button @click="loginGoogle" class="w-full py-4 bg-white text-black rounded-2xl font-900 tracking-widest uppercase flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" class="w-5 h-5"> Войти через Google
                        </button>
                    </div>
                    <div v-else class="text-center space-y-6">
                        <img :src="user.photoURL" class="w-20 h-20 rounded-full mx-auto border-4 border-blue-500/20 p-1">
                        <div>
                            <h3 class="font-900 text-base">{{ user.displayName }}</h3>
                            <p class="text-muted text-[10px]">{{ user.email }}</p>
                        </div>
                        <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                            <span class="text-xs font-bold text-muted uppercase tracking-widest">Защита входа</span>
                            <button @click="toggleLock" class="w-12 h-6 rounded-full relative transition-all" :class="isLockEnabled ? 'bg-blue-600' : 'bg-white/10'">
                                <div class="w-4 h-4 bg-white rounded-full absolute top-1 transition-all shadow-sm" :class="isLockEnabled ? 'right-1' : 'left-1'"></div>
                            </button>
                        </div>
                        <button @click="logout" class="w-full py-4 text-rose-500 font-900 text-[10px] uppercase tracking-widest border border-rose-500/20 rounded-xl">Выйти из аккаунта</button>
                    </div>
                </div>
            </transition>

            <button @click="startSession" class="fixed bottom-8 right-6 w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-[0_10px_25px_rgba(59,130,246,0.5)] active:scale-90 transition-transform z-40">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
          apiKey: "AIzaSyBQywx3tIsJE1l5NiV24IPd5flsejgtDNA",
          authDomain: "flowfinance-875b2.firebaseapp.com",
          projectId: "flowfinance-875b2",
          storageBucket: "flowfinance-875b2.firebasestorage.app",
          messagingSenderId: "171481332033",
          appId: "1:171481332033:web:3503b83b2d256f3c5c89c0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        const { createApp, ref, computed, watch, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                const appLoaded = ref(false), isLockEnabled = ref(localStorage.getItem('isLockEnabled')==='true'), appLocked = ref(isLockEnabled.value), user = ref(null);
                const transactions = ref([]), activeMonth = ref(new Date().toISOString().slice(0, 7)), isLight = ref(localStorage.getItem('theme')==='light');
                const sessionMode = ref(false), showSettings = ref(false), showHistory = ref(false), currentStep = ref(1), wizard = ref({});

                const categories = [
                    {name:'Продукты', icon:'🛒'}, {name:'Транспорт', icon:'⛽'}, {name:'Рестораны', icon:'🍕'}, 
                    {name:'Зарплата', icon:'💰'}, {name:'Подписки', icon:'📱'}, {name:'Дом', icon:'🏠'}, {name:'Прочее', icon:'📦'}
                ];

                onMounted(() => {
                    auth.onAuthStateChanged(u => {
                        user.value = u;
                        if(u) syncCloud(); else loadLocal();
                        setTimeout(() => appLoaded.value = true, 1500);
                    });
                });

                const syncCloud = async () => {
                    const doc = await db.collection('users').doc(user.value.uid).get();
                    if(doc.exists) transactions.value = doc.data().transactions || [];
                    else { loadLocal(); saveData(); }
                };
                const loadLocal = () => { transactions.value = JSON.parse(localStorage.getItem('finance_v8')) || []; };
                const saveData = async () => {
                    localStorage.setItem('finance_v8', JSON.stringify(transactions.value));
                    if(user.value) await db.collection('users').doc(user.value.uid).set({ transactions: transactions.value }, {merge:true});
                };

                const animatedBalance = ref(0);
                const monthIncome = computed(() => transactions.value.filter(t => t.date.startsWith(activeMonth.value) && t.amount > 0).reduce((s,t)=>s+t.amount,0));
                const monthExpense = computed(() => transactions.value.filter(t => t.date.startsWith(activeMonth.value) && t.amount < 0).reduce((s,t)=>s+Math.abs(t.amount),0));
                const monthBalance = computed(() => monthIncome.value - monthExpense.value);
                
                watch(monthBalance, (v) => {
                    let start = animatedBalance.value;
                    const animate = () => {
                        const step = (v - animatedBalance.value) * 0.1;
                        if(Math.abs(step) < 0.01) animatedBalance.value = v;
                        else { animatedBalance.value += step; requestAnimationFrame(animate); }
                    }; animate();
                }, {immediate:true});

                const swipeState = ref({});
                const onTouchStart = (e, id) => { swipeState.value[id] = { startX: e.touches[0].clientX, offset: swipeState.value[id]?.offset || 0 }; };
                const onTouchMove = (e, id) => { let diff = e.touches[0].clientX - swipeState.value[id].startX; if(diff < -100) diff = -100; if(diff > 0) diff = 0; swipeState.value[id].offset = diff; };
                const onTouchEnd = (e, id) => { swipeState.value[id].offset = swipeState.value[id].offset < -50 ? -80 : 0; };
                const getSwipeOffset = id => swipeState.value[id]?.offset || 0;

                const startSession = () => { wizard.value = { type:'expense', amount:'', date: new Date().toISOString().slice(0,10) }; currentStep.value = 1; sessionMode.value = true; };
                const selectCategory = c => { wizard.value.cat = c; wizard.value.name = c; currentStep.value = 3; };
                const nextStep = () => { if(currentStep.value===1 && wizard.value.amount > 0) currentStep.value = 2; else if(currentStep.value===3) { transactions.value.unshift({ id: Date.now(), ...wizard.value, amount: wizard.value.type==='expense' ? -wizard.value.amount : wizard.value.amount }); saveData(); sessionMode.value = false; } };

                const loginGoogle = () => {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    auth.signInWithRedirect(provider); // Изменено на Redirect для мобильных устройств
                };
                const logout = () => { if(confirm('Выйти?')) auth.signOut(); };
                const toggleLock = () => { isLockEnabled.value = !isLockEnabled.value; localStorage.setItem('isLockEnabled', isLockEnabled.value); };
                const unlockApp = () => appLocked.value = false;
                const toggleTheme = () => { isLight.value = !isLight.value; localStorage.setItem('theme', isLight.value ? 'light' : 'dark'); document.body.classList.toggle('light-theme', isLight.value); };

                return { 
                    appLoaded, appLocked, user, transactions, activeMonth, animatedBalance, monthIncome, monthExpense,
                    activeMonthLabel: computed(() => activeMonth.value.split('-').reverse().join('.')), 
                    availableMonths: computed(() => Array.from(new Set(transactions.value.map(t=>t.date.slice(0,7)))).sort().reverse().map(v=>({val:v, label:v}))),
                    filteredTxs: computed(() => transactions.value.filter(t=>t.date.startsWith(activeMonth.value))),
                    forecast: computed(() => { const daily = monthExpense.value / 30; return {daily}; }),
                    sessionMode, currentStep, wizard, categories, showSettings, isLockEnabled, showHistory,
                    startSession, selectCategory, nextStep, deleteTx: id => { transactions.value = transactions.value.filter(t=>t.id!==id); saveData(); },
                    onTouchStart, onTouchMove, onTouchEnd, getSwipeOffset, loginGoogle, logout, toggleLock, unlockApp, toggleTheme, isLight,
                    getCatIcon: c => categories.find(cat=>cat.name===c)?.icon || '📦', formatDate: d => d.split('-').reverse().join('.'), getCatColor: c => '#3b82f6'
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
