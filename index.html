<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FINANCE.X</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    
    <style>
        /* CORE VARIABLES (Dark by default - Midnight Slate) */
        :root { 
            --accent: #3b82f6; 
            --bg: #020617; 
            --panel: rgba(30, 41, 59, 0.6); 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border-color: rgba(255,255,255,0.08);
            --bg-input: rgba(0,0,0,0.3);
        }

        /* LIGHT THEME VARIABLES */
        body.light-theme { 
            --accent: #2563eb; 
            --bg: #f1f5f9; 
            --panel: rgba(255, 255, 255, 0.8); 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --border-color: rgba(0,0,0,0.06);
            --bg-input: rgba(255,255,255,0.5);
        }

        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; transition: background 0.4s, color 0.4s; min-height: 100vh; }
        
        /* Premium Background Gradient */
        body::before {
            content: ''; position: fixed; top: -20%; right: -10%; width: 70%; height: 70%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            opacity: 0.15; z-index: -1; pointer-events: none;
        }

        [v-cloak] { display: none !important; }
        
        .panel { background: var(--panel); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--border-color); border-radius: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .text-muted { color: var(--text-muted); }
        
        .input-huge { background: transparent; border: none; font-size: 3.5rem; font-weight: 900; text-align: center; color: var(--text-main); width: 100%; outline: none; caret-color: var(--accent); }
        .input-huge::placeholder { color: var(--text-muted); opacity: 0.5; }
        
        .bg-input { background: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); }
        
        ::-webkit-scrollbar { display: none; }
        .slide-up-enter-active, .slide-up-leave-active { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up-enter-from, .slide-up-leave-to { opacity: 0; transform: translateY(40px) scale(0.95); }
    </style>
</head>
<body class="pb-32 antialiased">
    <div id="app" v-cloak class="max-w-md mx-auto p-4 min-h-screen flex flex-col relative z-10">
        
        <header class="flex justify-between items-center py-4 mb-2">
            <div>
                <h1 class="text-2xl font-900 tracking-tighter">FINANCE<span class="text-blue-500">.X</span></h1>
                <div class="flex gap-2 overflow-x-auto mt-2 no-scrollbar" v-if="transactions.length > 0">
                    <button v-for="m in availableMonths" :key="m.val" @click="activeMonth = m.val" 
                            class="text-[10px] font-bold px-4 py-1.5 rounded-full border transition-all whitespace-nowrap"
                            :class="activeMonth === m.val ? 'border-blue-500 text-blue-500 bg-blue-500/10' : 'border-color text-muted'">
                        {{ m.label }}
                    </button>
                </div>
            </div>
            <div class="flex gap-2">
                <button @click="toggleTheme" class="w-10 h-10 rounded-full panel flex items-center justify-center text-xl active:scale-90 transition-transform">
                    {{ isLight ? '🌙' : '☀️' }}
                </button>
                <button @click="showSettings = !showSettings" class="w-10 h-10 rounded-full panel flex items-center justify-center text-xl active:scale-90 transition-transform">
                    ⚙️
                </button>
            </div>
        </header>

        <transition name="slide-up">
            <div v-if="!sessionMode && !showSettings" class="space-y-4">
                
                <div v-if="transactions.length === 0" class="panel p-8 flex flex-col items-center justify-center text-center mt-6 shadow-lg border-blue-500/30">
                    <span class="text-6xl mb-6 animate-bounce" style="animation-duration: 2s;">🚀</span>
                    <h3 class="text-xl font-900 mb-3">Всё готово к работе</h3>
                    <p class="text-xs text-muted mb-8 leading-relaxed">Начните вести учет с чистого листа, нажав «Внести», или посмотрите, как приложение работает вживую, загрузив демо-данные.</p>
                    <button @click="loadDemoData" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-900 text-xs tracking-widest uppercase active:scale-95 transition-transform shadow-lg shadow-blue-500/30">
                        Посмотреть демо
                    </button>
                </div>

                <template v-else>
                    
                    <div class="panel p-5 relative overflow-hidden group">
                        <div class="absolute inset-0 bg-gradient-to-r from-blue-500/10 to-purple-500/10 opacity-50"></div>
                        <div class="relative z-10">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="text-lg">🤖</span>
                                <h3 class="font-900 text-[10px] tracking-widest uppercase text-blue-500">AI Аналитика</h3>
                            </div>
                            <p class="text-xs font-semibold leading-relaxed" :class="isLight ? 'text-gray-700' : 'text-gray-300'">{{ smartInsight }}</p>
                        </div>
                    </div>

                    <div class="panel p-6 relative overflow-hidden">
                        <div class="absolute bottom-0 left-0 right-0 h-1/2 opacity-20 pointer-events-none">
                            <svg viewBox="0 0 100 30" preserveAspectRatio="none" class="w-full h-full text-blue-500">
                                <polyline fill="none" stroke="currentColor" stroke-width="2.5" :points="sparklinePoints" stroke-linejoin="round" stroke-linecap="round"/>
                            </svg>
                        </div>

                        <div class="relative z-10 flex justify-between items-start">
                            <div>
                                <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Баланс месяца</p>
                                <div class="text-5xl font-900 tracking-tighter" :class="monthBalance >= 0 ? '' : 'text-rose-500'">
                                    {{ monthBalance >= 0 ? '+' : '' }}{{ monthBalance.toFixed(2) }}<span class="text-xl text-blue-500 ml-1">€</span>
                                </div>
                                <div class="mt-2 text-[11px] font-bold flex items-center gap-1" :class="forecast.save >= 0 ? 'text-green-500' : 'text-rose-500'">
                                    Прогноз: {{ forecast.save >= 0 ? '+' : '' }}{{ forecast.save.toFixed(0) }} €
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-1">Трата</p>
                                <div class="text-2xl font-900">{{ forecast.daily.toFixed(0) }}</div>
                                <p class="text-[10px] text-muted mt-1 font-semibold">€ в день</p>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="panel p-5">
                            <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-2">Доходы</p>
                            <p class="text-xl font-900 text-green-500">+{{ monthIncome.toFixed(0) }} €</p>
                        </div>
                        <div class="panel p-5">
                            <p class="text-[10px] text-muted font-bold uppercase tracking-widest mb-2">Расходы</p>
                            <p class="text-xl font-900 text-rose-500">-{{ monthExpense.toFixed(0) }} €</p>
                        </div>
                    </div>

                    <div class="panel p-6 mt-4 flex-1">
                        <h2 class="text-[10px] text-muted font-bold uppercase tracking-widest mb-6">Хронология</h2>
                        
                        <div class="relative border-l-2 ml-3 space-y-8" style="border-color: var(--border-color)">
                            <div v-for="t in filteredTxs.slice(0, 15)" :key="t.id" class="relative pl-6 group">
                                <div class="absolute -left-[9px] top-1 w-4 h-4 rounded-full border-4" 
                                     :style="{ backgroundColor: isLight ? '#fff' : '#000', borderColor: t.amount > 0 ? '#10b981' : getCatColor(t.cat) }"></div>
                                
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h3 class="font-900 text-lg leading-none" :class="t.amount > 0 ? 'text-green-500' : ''">
                                            {{ t.amount > 0 ? '+' : '' }}{{ t.amount.toFixed(2) }} €
                                        </h3>
                                        <p class="text-sm font-bold mt-2 flex items-center gap-1.5" :class="isLight ? 'text-gray-600' : 'text-gray-300'">
                                            {{ getCatIcon(t.cat) }} {{ t.name }}
                                        </p>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xs font-800 text-muted">{{ formatDate(t.date) }}</span>
                                        <button @click="deleteTx(t.id)" class="block mt-2 text-[10px] text-rose-500 font-bold uppercase opacity-0 group-hover:opacity-100 transition-opacity ml-auto px-2 py-1 rounded-md" style="background: rgba(244,63,94,0.1)">Удалить</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </transition>

        <transition name="slide-up">
            <div v-if="sessionMode" class="panel p-6 flex flex-col min-h-[75vh] mt-4 relative overflow-hidden">
                <div class="flex justify-between items-center mb-8 relative z-10">
                    <div class="flex gap-1">
                        <div v-for="step in 3" :key="step" class="h-1.5 w-6 rounded-full transition-colors duration-300" :class="step <= currentStep ? 'bg-blue-500' : 'bg-gray-500/30'"></div>
                    </div>
                    <button @click="sessionMode = false" class="text-[10px] font-bold text-muted uppercase tracking-widest p-2">Отмена</button>
                </div>
                
                <div class="flex-1 flex flex-col justify-center min-h-[300px] relative z-10">
                    <div v-if="currentStep === 1" class="w-full">
                        <div class="flex justify-center gap-2 mb-8 bg-input p-1 rounded-full w-max mx-auto">
                            <button @click="wizard.type = 'expense'" class="px-6 py-2.5 rounded-full font-800 text-xs transition-all" :class="wizard.type === 'expense' ? (isLight ? 'bg-white text-black shadow-sm' : 'bg-white text-black') : 'text-muted'">РАСХОД</button>
                            <button @click="wizard.type = 'income'" class="px-6 py-2.5 rounded-full font-800 text-xs transition-all" :class="wizard.type === 'income' ? (isLight ? 'bg-white text-black shadow-sm' : 'bg-white text-black') : 'text-muted'">ДОХОД</button>
                        </div>
                        <input type="number" step="0.01" v-model.number="wizard.amount" ref="mainInput" class="input-huge" placeholder="0" autofocus>
                    </div>
                    
                    <div v-if="currentStep === 2" class="w-full">
                        <h2 class="text-center text-sm font-bold text-blue-500 uppercase tracking-widest mb-6">Категория</h2>
                        <div class="grid grid-cols-3 gap-3">
                            <button v-for="c in categories" :key="c.name" @click="selectCategory(c.name)" 
                                    class="flex flex-col items-center justify-center py-5 px-2 rounded-2xl bg-input active:scale-95 transition-transform border border-transparent hover:border-blue-500/50">
                                <span class="text-3xl mb-2">{{ c.icon }}</span>
                                <span class="text-[10px] font-bold text-muted w-full text-center tracking-wider leading-tight">{{ c.name }}</span>
                            </button>
                        </div>
                    </div>
                    
                    <div v-if="currentStep === 3" class="w-full space-y-6">
                        <div>
                            <label class="text-[10px] font-bold text-muted uppercase tracking-widest pl-4">Название (Опционально)</label>
                            <input type="text" v-model="wizard.name" class="w-full mt-2 bg-input rounded-2xl p-4 font-bold outline-none focus:border-blue-500 text-lg" :placeholder="wizard.category">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-muted uppercase tracking-widest pl-4">Дата</label>
                            <input type="date" v-model="wizard.date" class="w-full mt-2 bg-input rounded-2xl p-4 font-bold outline-none focus:border-blue-500 text-lg">
                        </div>
                    </div>
                </div>
                
                <button v-if="currentStep !== 2" @click="nextStep" class="w-full py-5 rounded-2xl bg-blue-600 text-white font-900 text-lg mt-8 active:scale-95 transition-transform shadow-[0_10px_30px_rgba(59,130,246,0.3)] relative z-10">
                    {{ currentStep === 3 ? 'СОХРАНИТЬ' : 'ДАЛЕЕ' }}
                </button>
            </div>
        </transition>

        <transition name="slide-up">
            <div v-if="showSettings" class="panel p-6 flex flex-col min-h-[60vh] mt-4">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="font-900 text-xl tracking-tight">НАСТРОЙКИ</h2>
                    <button @click="showSettings = false" class="w-8 h-8 flex items-center justify-center bg-input rounded-full font-bold">✕</button>
                </div>
                <div class="space-y-6">
                    <div class="p-5 bg-input rounded-2xl">
                        <div class="flex items-center gap-3 mb-3"><span class="text-2xl">🏦</span><h3 class="font-900 text-sm">Импорт Swedbank</h3></div>
                        <p class="text-[11px] text-muted mb-4 font-semibold">Загрузите вашу банковскую выписку в формате CSV.</p>
                        <input type="file" id="csvFile" accept=".csv" @change="importCSV" class="hidden">
                        <button @click="triggerCSV" class="w-full py-4 panel rounded-xl font-900 text-xs tracking-widest uppercase active:scale-95 transition-transform">Выбрать файл</button>
                        <p v-if="importMsg" class="text-[10px] text-green-500 mt-3 text-center font-bold">{{ importMsg }}</p>
                    </div>

                    <div class="p-5 bg-input rounded-2xl">
                        <div class="flex items-center gap-3 mb-3"><span class="text-2xl">⚠️</span><h3 class="font-900 text-sm text-rose-500">Сброс данных</h3></div>
                        <button @click="hardReset" class="w-full py-4 text-rose-500 rounded-xl font-900 text-xs tracking-widest uppercase active:scale-95 transition-transform" style="background: rgba(244,63,94,0.1)">Очистить базу</button>
                    </div>
                </div>
            </div>
        </transition>

        <div v-if="!sessionMode && !showSettings" class="fixed bottom-6 left-0 right-0 flex justify-center z-50 px-4 pointer-events-none">
            <button @click="startSession" class="pointer-events-auto w-full max-w-[200px] py-4 rounded-full font-900 text-sm tracking-widest uppercase flex items-center justify-center gap-2 shadow-2xl active:scale-95 transition-transform" :class="isLight ? 'bg-blue-600 text-white' : 'bg-white text-black'">
                <span class="text-xl">⚡</span> ВНЕСТИ
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick } = Vue;

        createApp({
            setup() {
                // CATEGORIES
                const categories = ref([
                    {name:'Продукты', icon:'🛒', color:'#f97316'}, {name:'Транспорт', icon:'⛽', color:'#3b82f6'},
                    {name:'Аптека', icon:'💊', color:'#f43f5e'}, {name:'Рестораны', icon:'🍕', color:'#facc15'},
                    {name:'Одежда', icon:'👗', color:'#a855f7'}, {name:'Кредиты', icon:'🏦', color:'#ec4899'},
                    {name:'Подписки', icon:'📱', color:'#8b5cf6'}, {name:'Зарплата', icon:'💰', color:'#10b981'},
                    {name:'Переводы', icon:'💸', color:'#fcd34d'}, {name:'Здоровье', icon:'🏃', color:'#22c55e'},
                    {name:'Развлечения', icon:'🎮', color:'#ef4444'}, {name:'Дом', icon:'🏠', color:'#eab308'},
                    {name:'Прочее', icon:'📦', color:'#6b7280'}
                ]);

                // НОВЫЙ КЛЮЧ ДЛЯ ЧИСТОЙ ЗАГРУЗКИ (financeX_v4)
                let initialTxs = [];
                try { initialTxs = JSON.parse(localStorage.getItem('financeX_v4')) || []; } catch(e) {}
                const transactions = ref(Array.isArray(initialTxs) ? initialTxs : []);
                
                const activeMonth = ref(new Date().toISOString().slice(0, 7));
                const isLight = ref(localStorage.getItem('financeX_theme') === 'light');
                
                const sessionMode = ref(false);
                const showSettings = ref(false);
                const currentStep = ref(1);
                const mainInput = ref(null);
                const importMsg = ref('');
                const wizard = ref({ type: 'expense', amount: '', category: '', name: '', date: '' });

                // THEME TOGGLE
                const toggleTheme = () => {
                    isLight.value = !isLight.value;
                    localStorage.setItem('financeX_theme', isLight.value ? 'light' : 'dark');
                    document.body.classList.toggle('light-theme', isLight.value);
                };

                onMounted(() => {
                    if(isLight.value) document.body.classList.add('light-theme');
                });

                const saveData = () => localStorage.setItem('financeX_v4', JSON.stringify(transactions.value));
                const getCatIcon = (n) => categories.value.find(c => c.name === n)?.icon || '📦';
                const getCatColor = (n) => categories.value.find(c => c.name === n)?.color || '#3b82f6';
                const formatDate = (d) => (d || '').split('-').reverse().join('.');

                const availableMonths = computed(() => {
                    const txs = transactions.value;
                    if (!txs || txs.length === 0) return [{val: activeMonth.value, label: activeMonth.value}];
                    try {
                        const mSet = new Set(txs.map(t => (t.date || '').slice(0,7)).filter(Boolean));
                        mSet.add(new Date().toISOString().slice(0, 7)); 
                        return Array.from(mSet).sort().reverse().map(m => {
                            const [y, mo] = m.split('-');
                            const mNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
                            return { val: m, label: `${mNames[parseInt(mo)-1] || ''} ${y}` };
                        });
                    } catch(e) { return [{val: activeMonth.value, label: activeMonth.value}]; }
                });

                const filteredTxs = computed(() => transactions.value.filter(t => (t.date||'').startsWith(activeMonth.value)).sort((a,b) => (b.date||'').localeCompare(a.date||'')));
                const monthIncome = computed(() => filteredTxs.value.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0));
                const monthExpense = computed(() => filteredTxs.value.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0));
                const monthBalance = computed(() => monthIncome.value - monthExpense.value);

                const sparklinePoints = computed(() => {
                    const txs = filteredTxs.value.slice().sort((a,b) => (a.date||'').localeCompare(b.date||'')); 
                    if (txs.length === 0) return "0,30 100,30";
                    let bal = 0;
                    const pointsArr = txs.map(t => { bal += t.amount; return bal; });
                    const min = Math.min(...pointsArr, 0), max = Math.max(...pointsArr, 1), range = max - min || 1;
                    return pointsArr.map((p, i) => `${(i / (pointsArr.length - 1 || 1)) * 100},${30 - ((p - min) / range * 25)}`).join(' ');
                });

                const forecast = computed(() => {
                    const [y, m] = activeMonth.value.split('-').map(Number);
                    if(!y || !m) return { daily: 0, save: 0 };
                    const today = new Date(), isCurrent = today.getFullYear() === y && today.getMonth() + 1 === m;
                    const daysInMonth = new Date(y, m, 0).getDate(), dayNow = isCurrent ? today.getDate() : daysInMonth;
                    const daily = dayNow > 0 ? monthExpense.value / dayNow : 0;
                    return { daily, save: monthIncome.value - (daily * daysInMonth) };
                });

                const smartInsight = computed(() => {
                    if(monthExpense.value === 0) return "Внесите ваши первые расходы, чтобы ИИ начал анализ ваших привычек.";
                    if(forecast.value.save < 0) return `Внимание: при текущем темпе трат вы уйдете в минус на ${Math.abs(forecast.value.save).toFixed(0)}€. Попробуйте немного сократить расходы.`;
                    return `Отличный темп! Если продолжите так же, к концу месяца у вас останется примерно ${forecast.value.save.toFixed(0)}€.`;
                });

                // WIZARD
                const startSession = () => {
                    wizard.value = { type: 'expense', amount: '', category: '', name: '', date: new Date().toISOString().split('T')[0] };
                    currentStep.value = 1; sessionMode.value = true;
                    nextTick(() => mainInput.value && mainInput.value.focus());
                };
                const selectCategory = (cat) => { wizard.value.category = cat; wizard.value.name = wizard.value.name || cat; currentStep.value = 3; };
                const nextStep = () => {
                    if (currentStep.value === 1 && wizard.value.amount > 0) currentStep.value = 2;
                    else if (currentStep.value === 3) {
                        transactions.value.unshift({
                            id: Date.now(), name: wizard.value.name || wizard.value.category,
                            amount: wizard.value.type === 'expense' ? -Math.abs(wizard.value.amount) : Math.abs(wizard.value.amount),
                            cat: wizard.value.category, date: wizard.value.date || new Date().toISOString().split('T')[0]
                        });
                        saveData(); sessionMode.value = false; window.scrollTo({top: 0});
                    }
                };

                const deleteTx = (id) => { if(confirm('Безвозвратно удалить?')) { transactions.value = transactions.value.filter(t => t.id !== id); saveData(); } };
                
                // DEMO DATA GENERATOR
                const loadDemoData = () => {
                    const demo = []; const now = new Date(); const y = now.getFullYear(); const m = String(now.getMonth() + 1).padStart(2, '0');
                    demo.push({ id: 1, name: 'Зарплата', amount: 3500, cat: 'Зарплата', date: `${y}-${m}-01` });
                    demo.push({ id: 2, name: 'Аренда квартиры', amount: -1200, cat: 'Дом', date: `${y}-${m}-02` });
                    demo.push({ id: 3, name: 'Prisma Supermarket', amount: -145.50, cat: 'Продукты', date: `${y}-${m}-05` });
                    demo.push({ id: 4, name: 'Spotify & Netflix', amount: -21.98, cat: 'Подписки', date: `${y}-${m}-06` });
                    demo.push({ id: 5, name: 'Wolt Delivery', amount: -34.00, cat: 'Рестораны', date: `${y}-${m}-08` });
                    demo.push({ id: 6, name: 'Zara', amount: -89.90, cat: 'Одежда', date: `${y}-${m}-12` });
                    transactions.value = demo.sort((a,b) => b.date.localeCompare(a.date));
                    activeMonth.value = `${y}-${m}`; saveData(); showSettings.value = false;
                };

                // CSV
                const triggerCSV = () => document.getElementById('csvFile').click();
                const importCSV = (e) => {
                    const file = e.target.files[0]; if (!file) return;
                    const r = new FileReader();
                    r.onload = (ev) => {
                        try {
                            const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
                            const delim = lines[0].includes(';') ? ';' : ',';
                            let added = 0;
                            for(let i=1; i<lines.length; i++) {
                                const cols = lines[i].split(delim).map(c => c.replace(/^"|"$/g, '').trim());
                                if(cols.length < 5) continue;
                                const dateMatch = cols.find(c => c.match(/^\d{2}\.\d{2}\.\d{4}$/)); if(!dateMatch) continue;
                                const date = dateMatch.split('.').reverse().join('-');
                                const amtStr = cols.find(c => c.match(/^-?\d+[,.]\d{2}$/)); if(!amtStr) continue;
                                const amt = parseFloat(amtStr.replace(',', '.'));
                                const name = cols[3] || cols[2] || 'Swedbank TX';
                                if(!transactions.value.some(t => t.date === date && t.amount === amt && t.name === name)) {
                                    transactions.value.unshift({ id: Date.now() + i, name, amount: amt, date, cat: 'Прочее' });
                                    added++;
                                }
                            }
                            saveData(); importMsg.value = `УСПЕХ: +${added} операций.`;
                            setTimeout(() => { showSettings.value = false; importMsg.value = ''; }, 2000);
                        } catch(err) { importMsg.value = `ОШИБКА формата.`; }
                    };
                    r.readAsText(file, 'UTF-8');
                };

                const hardReset = () => { if(confirm("Удалить ВСЁ?")) { transactions.value = []; saveData(); showSettings.value = false; } };

                return { 
                    transactions, categories, activeMonth, availableMonths, filteredTxs,
                    monthIncome, monthExpense, monthBalance, sparklinePoints, forecast, smartInsight,
                    sessionMode, showSettings, currentStep, wizard, mainInput, isLight, toggleTheme,
                    startSession, selectCategory, nextStep, deleteTx, getCatIcon, getCatColor, formatDate, 
                    triggerCSV, importCSV, importMsg, hardReset, loadDemoData
                };
            }
        }).mount('#app');
    </script>
</body>
